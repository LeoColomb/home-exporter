# fly.toml app configuration file generated for home-exporter on 2026-06-07T21:25:35Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'home-exporter'
primary_region = 'cdg'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[experimental]
  auto_rollback = true

[build]

[deploy]
  strategy = 'rolling'

[env]
  ENV = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
